# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
"on":
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    # - cron:  "* 0/12 * * *"  #'*/60 * * * *'
    - cron: '0 8,22 * * *'
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches:
      - main
    paths:
      - '.github/workflows/main.yml'
      - 'daily_arxiv.py'
      - '.gitignore'

env:

  GITHUB_USER_NAME: bansky-cl
  GITHUB_USER_EMAIL: cxy1365@163.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Set up Python Env
        uses: actions/setup-python@v6
        with:
          python-version: 3.10.20

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install arxiv requests matplotlib
          
      - name: Run daily arxiv 
        run: |
          python daily_arxiv.py
          
      - name: Commit and push updates
        run: |
          git config user.name "${GITHUB_USER_NAME}"
          git config user.email "${GITHUB_USER_EMAIL}"
          git add README.md docs/arxiv-daily.json imgs/trend.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Github Action Automatic Update Diffusion NLP Arxiv Papers"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
